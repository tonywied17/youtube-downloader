name: Question / Support
description: Ask a question or get help using the app.
title: '[Question]: '
labels: [question]
body:
  - type: markdown
    attributes:
      value: |
        Have a question about using YouTube Downloader? Ask away.

  - type: textarea
    id: question
    attributes:
      label: Your question
      description: What would you like to know?
    validations:
      required: true

  - type: input
    id: app-version
    attributes:
      label: App version (optional)
      description: Find this under Settings → About.
      placeholder: v0.1.2
    validations:
      required: false

  - type: dropdown
    id: os
    attributes:
      label: Operating system (optional)
      options:
        - Windows
        - macOS
        - Linux
    validations:
      required: false
