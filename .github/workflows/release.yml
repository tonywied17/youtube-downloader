name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      YOUTUBE_DL_SKIP_DOWNLOAD: '1'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

  release:
    needs: verify
    strategy:
      matrix:
        include:
          - os: windows-latest
            script: package:win
          - os: macos-latest
            script: package:mac
          - os: ubuntu-latest
            script: package:linux
    runs-on: ${{ matrix.os }}
    env:
      YOUTUBE_DL_SKIP_DOWNLOAD: '1'
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install rpm tooling
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y rpm

      - name: Build and package
        run: npm run ${{ matrix.script }}
        env:
          # Unsigned CI build: don't define CSC_LINK/CSC_KEY_PASSWORD at all -
          # an empty value makes electron-builder treat it as a cert file path
          # and fail with "<projectDir> not a file". Disable identity discovery.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Upload artifacts
        uses: softprops/action-gh-release@v3
        with:
          draft: true
          generate_release_notes: true
          files: |
            dist/*.exe
            dist/*.pkg
            dist/*.zip
            dist/*.deb
            dist/*.rpm
            dist/latest*.yml

  publish:
    needs: release
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Publish the release
        # The matrix uploads to a shared draft so all platform assets land
        # without racing. Flip it to a published, latest release once done.
        run: gh release edit "${{ github.ref_name }}" --repo "${{ github.repository }}" --draft=false --latest

  notify-badges:
    name: Refresh profile badges
    needs: [publish]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch refresh-badges
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          gh api -X POST repos/tonywied17/tonywied17/dispatches \
            -f event_type=refresh-badges \
            -f "client_payload[repo]=${{ github.repository }}"
