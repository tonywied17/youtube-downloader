name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      YOUTUBE_DL_SKIP_DOWNLOAD: '1'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

  release:
    needs: verify
    strategy:
      matrix:
        include:
          - os: windows-latest
            script: package:win
          - os: macos-latest
            script: package:mac
          - os: ubuntu-latest
            script: package:linux
    runs-on: ${{ matrix.os }}
    env:
      YOUTUBE_DL_SKIP_DOWNLOAD: '1'
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build and package
        run: npm run ${{ matrix.script }}
        env:
          # Code signing — no-op when these secrets are unset (unsigned build).
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          # macOS notarization — only triggers when all three are present.
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Skip identity auto-discovery so unsigned macOS builds don't fail in CI.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Upload artifacts
        uses: softprops/action-gh-release@v3
        with:
          draft: true
          generate_release_notes: true
          files: |
            dist/*.exe
            dist/*.dmg
            dist/*.zip
            dist/*.AppImage
            dist/*.yml
            dist/*.blockmap
