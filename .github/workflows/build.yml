name: Build

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  package:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            script: package:win
          - os: macos-latest
            script: package:mac
          - os: ubuntu-latest
            script: package:linux
    runs-on: ${{ matrix.os }}
    env:
      YOUTUBE_DL_SKIP_DOWNLOAD: '1'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install rpm tooling
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y rpm

      - name: Build and package
        run: npm run ${{ matrix.script }}
        env:
          # Unsigned CI build: don't define CSC_LINK/CSC_KEY_PASSWORD at all -
          # an empty value makes electron-builder treat it as a cert file path
          # and fail with "<projectDir> not a file". Disable identity discovery.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Upload draft artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.os }}-package
          retention-days: 7
          if-no-files-found: ignore
          path: |
            dist/*.exe
            dist/*.pkg
            dist/*.zip
            dist/*.deb
            dist/*.rpm
            dist/*.blockmap

  notify-badges:
    name: Refresh profile badges
    needs: [package]
    if: github.event_name != 'pull_request' && always()
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch refresh-badges
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          gh api -X POST repos/tonywied17/tonywied17/dispatches \
            -f event_type=refresh-badges \
            -f "client_payload[repo]=${{ github.repository }}"
