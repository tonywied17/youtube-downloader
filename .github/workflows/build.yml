name: Build

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  package:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            script: package:win
          - os: macos-latest
            script: package:mac
          - os: ubuntu-latest
            script: package:linux
    runs-on: ${{ matrix.os }}
    env:
      YOUTUBE_DL_SKIP_DOWNLOAD: '1'
      # Surfaced to job env so step `if:` can test it - the `secrets` context
      # is not allowed inside `if` expressions, but `env` is.
      MAC_CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install rpm tooling
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y rpm

      # macOS, signed: runs only when the Apple Developer ID cert is configured.
      # Signs the .app and .dmg. Notarization happens only in the release
      # workflow (this build just produces signed CI artifacts).
      - name: Build and package (macOS, signed)
        if: matrix.os == 'macos-latest' && env.MAC_CSC_LINK != ''
        run: npm run ${{ matrix.script }}
        env:
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      # macOS fallback before signing secrets exist: unsigned build so the
      # build pipeline keeps working. Drop this once signing is in place.
      - name: Build and package (macOS, unsigned)
        if: matrix.os == 'macos-latest' && env.MAC_CSC_LINK == ''
        run: npm run ${{ matrix.script }}
        env:
          # Unsigned CI build: don't define CSC_LINK/CSC_KEY_PASSWORD at all -
          # an empty value makes electron-builder treat it as a cert file path
          # and fail with "<projectDir> not a file". Disable identity discovery.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Build and package (Windows/Linux)
        if: matrix.os != 'macos-latest'
        run: npm run ${{ matrix.script }}
        env:
          # Unsigned CI build: don't define CSC_LINK/CSC_KEY_PASSWORD at all -
          # an empty value makes electron-builder treat it as a cert file path
          # and fail with "<projectDir> not a file". Disable identity discovery.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Upload draft artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.os }}-package
          retention-days: 7
          if-no-files-found: ignore
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.zip
            dist/*.deb
            dist/*.rpm
