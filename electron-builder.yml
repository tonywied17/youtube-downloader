appId: com.molex.youtube-downloader
productName: YouTube Downloader
copyright: Copyright © 2026 molex

directories:
  output: dist
  buildResources: build

files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!docs/*'
  - '!tests/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!vitest.config.{js,ts,mjs,cjs}'
  - '!{.eslintignore,.eslintrc.cjs,eslint.config.mjs,.prettierignore,.prettierrc.json}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json,postcss.config.cjs}'
  - '!{.editorconfig,.gitignore,.gitattributes}'
  - '!{coverage,.github,.git}'
  - '!{README.md,LICENSE}'

asarUnpack:
  - resources/**

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.png
  artifactName: YouTube-Downloader-${version}-Windows-Setup.${ext}

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: always
  createStartMenuShortcut: true
  shortcutName: YouTube Downloader
  differentialPackage: false

mac:
  category: public.app-category.utilities
  icon: build/icon.png
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  # Disable electron-builder's built-in notarize step - it auto-detects Apple
  # credentials and runs a blocking poll even without notarize:true. The
  # release workflow submits the .dmg to notarytool (no-wait) in a dedicated
  # step and staples it in the notarize-macos job, so the build never blocks
  # on Apple's queue (up to 24 h on new Developer accounts).
  notarize: false
  target:
    # .dmg is signed with the Developer ID Application cert (same one that
    # signs the .app) - unlike .pkg, which needs a separate Developer ID
    # Installer cert. This keeps signing/notarization/stapling to one cert.
    - target: dmg
      arch:
        - universal
    # Squirrel.Mac applies updates from a zipped .app, so electron-updater
    # requires a zip in latest-mac.yml. The .dmg is the user-facing installer
    # (-Installer); this zip is only consumed by the in-app auto-updater
    # (-Updater).
    - target: zip
      arch:
        - universal
  artifactName: YouTube-Downloader-${version}-macOS-Updater.${ext}

dmg:
  artifactName: YouTube-Downloader-${version}-macOS-Installer.${ext}

linux:
  target:
    - target: deb
      arch:
        - x64
    - target: rpm
      arch:
        - x64
  icon: build/icon.png
  category: AudioVideo
  maintainer: molex
  artifactName: YouTube-Downloader-${version}-Linux-Installer.${ext}

publish:
  provider: github
  owner: tonywied17
  repo: youtube-downloader
